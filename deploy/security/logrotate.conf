# ---------------------------------------------------------
# O-229 SERVER LOG ROTATION
# Target: Linux VPS (Ubuntu/Debian) -> /etc/logrotate.d/o-229
# ---------------------------------------------------------

# ─── NGINX Proxy Logs
/var/www/o-229/backend/storage/logs/nginx/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 `cat /var/run/nginx.pid`
    endscript
}

# ─── Laravel Application Logs
/var/www/o-229/backend/storage/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0664 www-data www-data
}

# ─── Docker Container Logs Fallback
/var/lib/docker/containers/*/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    copytruncate
    size 50M
}
