services:
  # ─── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: o229-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - o229-network
    restart: unless-stopped

  # ─── Laravel (PHP-FPM) ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - o229-network
    restart: unless-stopped

  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: o229-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-o229_education}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - o229-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-o229_education}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o229-network
    restart: unless-stopped

  # ─── Redis (Cache + Queues + Sessions) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: o229-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - o229-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o229-network
    restart: unless-stopped

  # ─── Queue Worker (Laravel Horizon-like) ────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-queue
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=high,default,reports --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - o229-network
    restart: unless-stopped

  # ─── Scheduler (Cron for Laravel) ───────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-scheduler
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - o229-network
    restart: unless-stopped

  # ─── Laravel Reverb (WebSockets) ────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-reverb
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    environment:
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
    depends_on:
      - app
      - redis
    networks:
      - o229-network
    restart: unless-stopped

  # ─── MinIO (S3 Compatible Storage) ──────────────────────
  minio:
    image: minio/minio
    container_name: o229-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - o229-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - o229-network
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - o229-network
    entrypoint: >
      sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/o229-backups || true;
      /usr/bin/mc mb myminio/o229-storage || true;
      /usr/bin/mc anonymous set public myminio/o229-storage;
      exit 0;
      "


networks:
  o229-network:
    driver: bridge

volumes:
  o229-pgdata:
    driver: local
  o229-redis-data:
    driver: local
  o229-minio-data:
    driver: local
