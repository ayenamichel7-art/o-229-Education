services:
  # ─── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: o229-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - o229-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Laravel (PHP-FPM) ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - o229-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─── PostgreSQL ─────────────────────────────────────────
  # ⚠️ Port NOT exposed to host — access only via Docker network
  postgres:
    image: postgres:16-alpine
    container_name: o229-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-o229_education}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # ports removed — no external access needed
    volumes:
      - o229-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-o229_education}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o229-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Redis (Cache + Queues + Sessions) ──────────────────
  # ⚠️ Password-protected + Port NOT exposed to host
  redis:
    image: redis:7-alpine
    container_name: o229-redis
    # ports removed — no external access needed
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    volumes:
      - o229-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - o229-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Queue Worker (Laravel Horizon-like) ────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-queue
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=high,default,reports --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000 --memory=128
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - o229-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Scheduler (Cron for Laravel) ───────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-scheduler
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - o229-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ─── Laravel Reverb (WebSockets) ────────────────────────
  # ⚠️ Port NOT exposed — proxied through Nginx /ws
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: o229-reverb
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    # ports removed — proxied via Nginx
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    environment:
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
    depends_on:
      - app
      - redis
    networks:
      - o229-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ─── MinIO (S3 Compatible Storage) ──────────────────────
  # ⚠️ API port internal only — Console disabled in production
  minio:
    image: minio/minio
    container_name: o229-minio
    # ports removed — internal access only via Docker network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - o229-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - o229-network
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - o229-network
    entrypoint: >
      sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/o229-backups || true;
      /usr/bin/mc mb myminio/o229-storage || true;
      /usr/bin/mc anonymous set private myminio/o229-storage;
      exit 0;
      "

  # ─── Uptime Kuma (Monitoring & Alerting) ────────────────
  # ⚠️ Only accessible internally — expose via Nginx with auth in production
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: o229-uptime-kuma
    volumes:
      - o229-uptime-kuma-data:/app/data
    environment:
      - UPTIME_KUMA_BASE_URL=/monitoring/
    # Port NOT exposed — proxy via Nginx with basic auth
    networks:
      - o229-network
    restart: unless-stopped

  # ─── Dozzle (Log Viewer) ──────────────────────────────
  # ⚠️ Only for development — DO NOT deploy in production
  dozzle:
    image: amir20/dozzle:latest
    container_name: o229-dozzle
    profiles:
      - dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    networks:
      - o229-network
    restart: unless-stopped

  # ─── pgAdmin (PostgreSQL GUI) ───────────────────────────
  # ⚠️ Only for development — DO NOT deploy in production
  pgadmin:
    image: dpage/pgadmin4
    container_name: o229-pgadmin
    profiles:
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@o-229.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    ports:
      - "5050:80"
    networks:
      - o229-network
    restart: unless-stopped
    depends_on:
      - postgres

  # ─── Mailpit (Email Testing) ───────────────────────────
  # ⚠️ Only for development — DO NOT deploy in production
  mailpit:
    image: axllent/mailpit
    container_name: o229-mailpit
    profiles:
      - dev
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - o229-network
    restart: unless-stopped

networks:
  o229-network:
    driver: bridge

volumes:
  o229-pgdata:
    driver: local
  o229-redis-data:
    driver: local
  o229-minio-data:
    driver: local
  o229-uptime-kuma-data:
    driver: local
